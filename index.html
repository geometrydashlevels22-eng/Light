<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjamin's Room Light Switch</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            color: #00adb5;
            margin-bottom: 30px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        .btn {
            font-size: 1.2rem;
            padding: 15px 40px;
            margin: 10px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-on {
            background-color: #00adb5;
            color: white;
        }
        .btn-on:hover {
            background-color: #00f5ff;
        }
        .btn-off {
            background-color: #393e46;
            color: #eeeeee;
        }
        .btn-off:hover {
            background-color: #4f5663;
        }
        #status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Room Lights</h1>
        <button class="btn btn-on" onclick="controlLights(1)">TURN ON</button>
        <button class="btn btn-off" onclick="controlLights(0)">TURN OFF</button>
        <div id="status">Ready</div>
    </div>

    <script>
        // --- YOUR GOVEE CONFIGURATION ---
        const API_KEY = '31573012-d275-449e-a409-59f4a1b6dd23'; 
        const MODEL = 'H600D';
        
        // List of your 3 bulb MAC addresses
        const BULBS = [
            'E0:72:A1:7F:0C:84', // Bulb 3
            'E0:72:A1:7D:1A:D8', // Bulb 2
            'E0:72:A1:7F:75:50'  // Bulb 1
        ];

        // Function to send the command to a single bulb
        async function sendLightCommand(macAddress, state) {
            const url = 'https://developer-api.govee.com/v1/devices/control';
            
            const data = {
                device: macAddress,
                model: MODEL,
                cmd: {
                    name: 'turn',
                    value: state === 1 ? 'on' : 'off'
                }
            };

            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Govee-API-Key': API_KEY
                },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                throw new Error(`Failed for ${macAddress}`);
            }
            return response.json();
        }

        // Function loops through all bulbs when you press a button
        async function controlLights(state) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = state === 1 ? "Turning lights on..." : "Turning lights off...";
            statusDiv.style.color = "#00adb5";

            try {
                // Send commands to all three bulbs at the same time
                await Promise.all(BULBS.map(mac => sendLightCommand(mac, state)));
                
                statusDiv.innerText = state === 1 ? "Lights are ON" : "Lights are OFF";
                statusDiv.style.color = "#2ed573";
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error controlling some lights. Check console/API key.";
                statusDiv.style.color = "#ff4757";
            }
        }
    </script>
</body>
</html>
